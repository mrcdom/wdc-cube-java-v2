name: remote_bridge_flutter
description: Framework bridge for Flutter remote shell clients — WebSocket protocol, ViewScope state, security, and base view abstractions.
version: 1.0.0

environment:
  sdk: ^3.12.1
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.2
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
