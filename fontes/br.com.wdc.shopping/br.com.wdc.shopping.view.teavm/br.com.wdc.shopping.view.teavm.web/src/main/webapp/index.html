<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="api-base-url" content="${api.base.url}">
    <title>WDC Shopping</title>
    <link rel="icon" href="favicon.ico" type="image/png">

    <!-- Bootstrap Icons (icon font only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Google Fonts: Inter for modern UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Spectrum Web Components -->
    <script src="https://jspm.dev/@spectrum-web-components/bundle/elements.js" type="module"></script>

    <style>
        :root {
            --app-accent: #0d66d0;
            --app-accent-light: #e8f1fc;
            --app-accent-dark: #0a4f9e;
            --app-surface: #ffffff;
            --app-bg: #f4f6f9;
            --app-text: #1d1d1f;
            --app-text-secondary: #6e6e73;
            --app-border: #e5e5ea;
            --app-shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --app-shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --app-shadow-lg: 0 10px 30px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.05);
            --app-radius: 12px;
            --app-radius-sm: 8px;
            --app-transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--app-bg);
            color: var(--app-text);
        }

        /* Prevent double-tap zoom on iOS */
        * { touch-action: manipulation; box-sizing: border-box; }

        /* Loading screen */
        #loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 16px;
            background: linear-gradient(135deg, #0d66d0 0%, #1a8cff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 500;
        }
        #loading::before {
            content: '\F217'; /* bi-cart3 */
            font-family: 'bootstrap-icons';
            font-size: 3rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }

        /* Product grid responsive */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
            .slot-purchases { width: 340px; flex-shrink: 0; }
        }
        @media (min-width: 1200px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* Responsive utilities */
        .sm-show { display: none; }
        .md-hide { }
        .md-show { display: none !important; }
        .md-row { flex-direction: column; }
        .md-grow-0 { }

        @media (min-width: 576px) {
            .sm-show { display: inline; }
            .sm-row { flex-direction: row; }
        }
        @media (min-width: 768px) {
            .md-hide { display: none !important; }
            .md-show { display: flex !important; }
            .md-row { flex-direction: row; }
            .md-grow-0 { flex-grow: 0; }
        }

        /* Card hover effects */
        .product-card {
            background: var(--app-surface);
            border-radius: var(--app-radius);
            border: 1px solid var(--app-border);
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--app-transition), box-shadow var(--app-transition);
            box-shadow: var(--app-shadow-sm);
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--app-shadow-lg);
        }
        .product-card:active {
            transform: translateY(0px);
            box-shadow: var(--app-shadow-sm);
        }

        /* Purchase item hover */
        .purchase-item {
            transition: background var(--app-transition), transform var(--app-transition);
        }
        .purchase-item:hover {
            background: var(--app-accent-light) !important;
            transform: translateX(2px);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c1c1c6; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1a6; }

        /* SWC button fixes: force accent fill and quiet borders */
        sp-button[variant="accent"] {
            --mod-button-background-color-default: var(--app-accent);
            --mod-button-background-color-hover: var(--app-accent-dark);
            --mod-button-background-color-active: #083d7a;
            --mod-button-content-color-default: #fff;
            --mod-button-content-color-hover: #fff;
            --mod-button-content-color-active: #fff;
            --mod-button-border-color-default: transparent;
            --mod-button-border-color-hover: transparent;
            --mod-button-border-color-active: transparent;
            padding: 6px 16px;
        }
        sp-action-button {
            padding: 4px 12px;
        }
        sp-action-button[quiet] {
            --mod-actionbutton-border-color-default: transparent;
            --mod-actionbutton-border-color-hover: var(--app-border);
            --mod-actionbutton-background-color-default: transparent;
            --mod-actionbutton-background-color-hover: var(--app-accent-light);
        }
        sp-textfield {
            border: 1px solid var(--app-border);
            border-radius: var(--app-radius-sm);
            transition: border-color var(--app-transition);
            padding: 10px 12px;
            min-height: 44px;
            box-sizing: border-box;
        }
        sp-textfield:hover, sp-textfield:focus-within {
            border-color: var(--app-accent);
        }
        sp-textfield::part(textfield) {
            font-style: italic;
            color: #999;
        }
        sp-action-group[compact] sp-action-button {
            --mod-actionbutton-border-color-default: var(--app-border);
        }

        /* Login layout: card centered on compact, flush on expanded */
        .login-root {
            justify-content: center;
            align-items: center;
            background: var(--app-bg);
        }
        .login-card {
            border-radius: var(--app-radius);
            box-shadow: var(--app-shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }
        @media (min-width: 768px) {
            .login-root {
                justify-content: flex-start;
                align-items: stretch;
                background: none;
            }
            .login-card {
                border-radius: 0;
                box-shadow: none;
                max-height: none;
                overflow-y: visible;
            }
        }
    </style>
</head>
<body>
    <div id="loading">Carregando...</div>
    <script>
        var p = location.pathname;
        if (p.lastIndexOf('/') > 0) p = p.substring(0, p.lastIndexOf('/') + 1);
        else if (!p.endsWith('/')) p += '/';
        var s = document.createElement('script');
        s.src = p + 'js/app.js';
        s.onload = function() { main(); };
        document.head.appendChild(s);
    </script>
</body>
</html>
