<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="api-base-url" content="${api.base.url}">
    <title>WDC Shopping</title>
    <link rel="icon" href="favicon.ico" type="image/png">

    <!-- Bootstrap Icons (icon font only) -->
    <!-- Note: path uses 'bootstrap-icons' (no @version) — Android aapt2 excludes assets with @ in the name.
         A symlink work/data/web-cache/cdn.jsdelivr.net/npm/bootstrap-icons -> bootstrap-icons@1.11.3 provides the alias. -->
    <link href="/web-cache/cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Google Fonts: Inter for modern UI -->
    <link href="/web-cache/fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Import map: unify Lit versions (SWC uses lit@2, @lit-labs/virtualizer uses lit@3).
         Note: not needed when using the self-contained swc-bundle/elements.js (no external imports). -->
    <script type="importmap">
    {
      "imports": {}
    }
    </script>

    <!-- Spectrum Web Components — self-contained esbuild bundle (no external imports).
         On desktop the backend serves this from /web-cache/swc-bundle/elements.js.
         On mobile (Tauri) it is embedded as a static asset in the app.
         Generated via: npx esbuild @spectrum-web-components/bundle@0.40.1/elements.js --bundle --format=esm --minify -->
    <script src="/web-cache/swc-bundle/elements.js" type="module"></script>

    <!-- App styles -->
    <link href="css/app.css" rel="stylesheet">
</head>
<body>
    <div id="loading">Carregando...</div>
    <script src="js/boot.js"></script>
</body>
</html>
