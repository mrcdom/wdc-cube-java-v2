# =============================================================================
# WeDoCode Shopping - Application Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Application
# ---------------------------------------------------------------------------
# app.basedir = "work"

# ---------------------------------------------------------------------------
# Database (H2)
# ---------------------------------------------------------------------------
[database]
# JDBC URL (default: h2 file in data dir)
# url = "jdbc:h2:file:./work/data/wedocode-shopping"
username = "sa"
password = "sa"
# Drop and recreate tables on startup
reset = false

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
[security.jwt]
# Secret key for JWT token signing (leave empty to auto-generate)
# secret = ""

# ---------------------------------------------------------------------------
# Server (Vaadin / React)
# ---------------------------------------------------------------------------
[server]
port = 8090

# ---------------------------------------------------------------------------
# Development
# ---------------------------------------------------------------------------
[dev]
# Enables dev tools (e.g. click logo to rebuild all Swing views)
mode = true
